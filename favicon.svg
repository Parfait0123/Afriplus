<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512"><metadata><rdf:RDF xmlns:rdf="http://www.w3.org/1999/02/22-rdf-syntax-ns#" xmlns:dc="http://purl.org/dc/elements/1.1/"><rdf:Description><dc:creator>RealFaviconGenerator</dc:creator><dc:source>https://realfavicongenerator.net</dc:source></rdf:Description></rdf:RDF></metadata><defs>
    <!-- Dégradé or profond -->
    <linearGradient id="gold" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#F5E7C8"></stop>
      <stop offset="35%" stop-color="#D4AF37"></stop>
      <stop offset="70%" stop-color="#C08435"></stop>
      <stop offset="100%" stop-color="#8B6914"></stop>
    </linearGradient>
    
    <!-- Dégradé de fond noir très élégant -->
    <linearGradient id="blackBg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1A1A1A"></stop>
      <stop offset="100%" stop-color="#0A0A0A"></stop>
    </linearGradient>

    <!-- Ombre subtile -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="6"></feGaussianBlur>
      <feComposite in="SourceGraphic" operator="over"></feComposite>
    </filter>
  </defs><rect width="512" height="512" rx="128" fill="url(#blackBg)" stroke="url(#gold)" stroke-width="2.5"></rect><circle cx="256" cy="256" r="210" fill="none" stroke="url(#gold)" stroke-width="1.2" opacity="0.6"></circle><g filter="url(#glow)">
    <!-- Jambe gauche du A -->
    <path d="M176 360 L240 156" stroke="url(#gold)" stroke-width="14" stroke-linecap="round" fill="none"></path>
    <!-- Jambe droite du A -->
    <path d="M336 360 L272 156" stroke="url(#gold)" stroke-width="14" stroke-linecap="round" fill="none"></path>
    <!-- Barre horizontale (couronne / pont) -->
    <path d="M200 280 L312 280" stroke="url(#gold)" stroke-width="12" stroke-linecap="round"></path>
  </g><circle cx="256" cy="340" r="8" fill="#FFFFFF" opacity="0.9"></circle><line x1="196" y1="392" x2="316" y2="392" stroke="url(#gold)" stroke-width="1.5" opacity="0.5"></line></svg>